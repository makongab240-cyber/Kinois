<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>

<style>
body{
  background:#05070B;
  margin:0;
  font-family:sans-serif;
  color:#EDE8DC;
  overflow:hidden;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

/* ✨ cinematic gold particles */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,215,0,0.25) 1px, transparent 1px),
    radial-gradient(circle at 60% 70%, rgba(196,154,60,0.2) 1px, transparent 1px),
    radial-gradient(circle at 80% 20%, rgba(255,209,0,0.18) 1px, transparent 1px);
  background-size:180px 180px;
  animation:drift 12s linear infinite;
  opacity:0.35;
  pointer-events:none;
}

@keyframes drift{
  0%{transform:translateY(0);}
  100%{transform:translateY(-60px);}
}

/* vignette */
.vignette{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle, transparent 55%, rgba(0,0,0,0.92));
}

/* main container */
.box{
  text-align:center;
  z-index:2;
  max-width:900px;
}

/* logo */
.logo{
  font-size:3.6rem;
  letter-spacing:0.7em;
  background:linear-gradient(120deg,#C49A3C,#FFD700,#FFF2B0,#C49A3C);
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:1rem;
}

/* 🇨🇩 flag beam (animated highlight) */
.flag{
  width:380px;
  height:6px;
  margin:0 auto 2rem auto;
  transform:skewX(-25deg);
  position:relative;
  overflow:hidden;
  background:linear-gradient(90deg,#00A3E0,#FFD100,#CE1126,#00A3E0);
}

.flag::after{
  content:"";
  position:absolute;
  top:0;
  left:-60%;
  width:50%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:sweep 3s infinite ease-in-out;
}

@keyframes sweep{
  0%{left:-60%;}
  100%{left:130%;}
}

/* timezone */
.timezone{
  font-size:0.7rem;
  opacity:0.6;
  letter-spacing:0.2em;
  margin-bottom:1rem;
}

/* clock */
.clock{
  width:110px;
  height:110px;
  border:2px solid rgba(255,215,0,0.25);
  border-radius:50%;
  margin:1rem auto;
  position:relative;
}

.hand{
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
  transform:translateX(-50%);
}

.hour{width:4px;height:28px;background:#C49A3C;}
.minute{width:3px;height:38px;background:#FFD700;}
.second{width:2px;height:42px;background:#CE1126;}

/* digital */
.digital{
  margin-top:8px;
  color:#FFD700;
  letter-spacing:0.25em;
}

/* countdown */
.countdown{
  display:flex;
  justify-content:center;
  gap:25px;
  margin:2rem 0;
}

.time-box span{
  font-size:2rem;
  color:#FFD700;
  display:block;
}

/* KEYNOTE TEXT SCENES */
.scene{
  opacity:0;
  transform:translateY(10px);
  animation:fadeScene 10s infinite;
  font-size:1.05rem;
  line-height:1.7;
  letter-spacing:0.05em;
}

.scene:nth-child(1){animation-delay:0s;}
.scene:nth-child(2){animation-delay:2.5s;}
.scene:nth-child(3){animation-delay:5s;}

@keyframes fadeScene{
  0%{opacity:0; transform:translateY(10px);}
  10%{opacity:1; transform:translateY(0);}
  30%{opacity:1;}
  40%{opacity:0; transform:translateY(-10px);}
  100%{opacity:0;}
}

/* lingala */
.lingala{
  margin-top:2rem;
  color:#FFD700;
  letter-spacing:0.4em;
}
</style>
</head>

<body>

<div class="vignette"></div>

<div class="box">

  <div class="logo">KINOI.S</div>

  <div class="flag"></div>

  <div class="timezone" id="tz"></div>

  <div class="clock">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
  </div>

  <div class="digital" id="digitalClock"></div>

  <div class="countdown">
    <div><span id="days"></span>Jours</div>
    <div><span id="hours"></span>Heures</div>
    <div><span id="minutes"></span>Minutes</div>
    <div><span id="seconds"></span>Secondes</div>
  </div>

  <!-- KEYNOTE STORY -->
  <div class="scene">
    L’infrastructure digitale de la diaspora congolaise.
  </div>

  <div class="scene">
    Where talent, trust, and opportunity converge into one ecosystem.
  </div>

  <div class="scene">
    A living network built for collaboration between diaspora and homeland.
  </div>

  <div class="lingala">BISO NA BISO</div>

</div>

<script>

const launchDate = new Date("2026-05-09T00:00:00Z").getTime();

/* timezone */
document.getElementById("tz").innerText =
  Intl.DateTimeFormat().resolvedOptions().timeZone;

function update(){

  const now = new Date();
  const diff = launchDate - now.getTime();

  document.getElementById("days").innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById("hours").innerText = Math.floor(diff/(1000*60*60)%24);
  document.getElementById("minutes").innerText = Math.floor(diff/(1000*60)%60);
  document.getElementById("seconds").innerText = Math.floor(diff/1000%60);

  const sec = now.getSeconds()*6;
  const min = now.getMinutes()*6;
  const hour = (now.getHours()%12)*30 + now.getMinutes()/2;

  document.getElementById("second").style.transform =
    `translateX(-50%) rotate(${sec}deg)`;

  document.getElementById("minute").style.transform =
    `translateX(-50%) rotate(${min}deg)`;

  document.getElementById("hour").style.transform =
    `translateX(-50%) rotate(${hour}deg)`;

  document.getElementById("digitalClock").innerText =
    now.toLocaleTimeString();

}

setInterval(update,1000);
update();

</script>

</body>
</html>
