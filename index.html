<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --gold-primary: #C49A3C;
  --gold-bright: #FFF2B0;
  --gold-dark: #8E6B24;
  --congo-blue: #0A1E33; /* Diepblauw uit de afbeelding */
  --congo-red: #CE1126;
}

body {
  background: radial-gradient(circle at center, #163252 0%, #050C17 100%);
  margin: 0;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  color: #EDE8DC;
  overflow: hidden;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ✨ Subtiele gouden deeltjes (onveranderd qua animatie) */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,215,0,0.15) 1px, transparent 1px),
    radial-gradient(circle at 60% 70%, rgba(196,154,60,0.1) 1px, transparent 1px);
  background-size: 180px 180px;
  animation: drift 15s linear infinite;
  opacity: 0.4;
  pointer-events: none;
}

@keyframes drift {
  0% { transform: translateY(0); }
  100% { transform: translateY(-60px); }
}

.vignette {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85));
  pointer-events: none;
}

.box {
  text-align: center;
  z-index: 2;
  max-width: 900px;
  padding: 20px;
}

/* Logo stijl gebaseerd op de afbeelding */
.logo {
  font-size: 4.2rem;
  font-weight: 700;
  letter-spacing: 0.5em;
  background: linear-gradient(to bottom, var(--gold-bright) 0%, var(--gold-primary) 50%, var(--gold-dark) 100%);
  -webkit-background-clip: text;
  color: transparent;
  margin-bottom: 0.5rem;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
}

.slogan {
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  color: var(--gold-primary);
  text-transform: uppercase;
  margin-bottom: 2rem;
  opacity: 0.9;
}

/* 🇨🇩 De subtiele vlag-lijn */
.flag {
  width: 250px;
  height: 3px;
  margin: 0 auto 2rem auto;
  position: relative;
  overflow: hidden;
  background: linear-gradient(90deg, #00A3E0 33%, #FFD100 33% 66%, #CE1126 66%);
  box-shadow: 0 0 15px rgba(0,163,224,0.3);
}

.flag::after {
  content: "";
  position: absolute;
  top: 0;
  left: -60%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: sweep 4s infinite ease-in-out;
}

@keyframes sweep {
  0% { left: -60%; }
  100% { left: 130%; }
}

.timezone {
  font-size: 0.75rem;
  color: var(--gold-primary);
  opacity: 0.7;
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
}

/* Klok met schild-look */
.clock {
  width: 120px;
  height: 120px;
  border: 1.5px solid var(--gold-primary);
  border-radius: 50%;
  margin: 1.5rem auto;
  position: relative;
  background: rgba(255, 255, 255, 0.03);
  box-shadow: inset 0 0 20px rgba(196, 154, 60, 0.1), 0 0 15px rgba(0,0,0,0.3);
}

.hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom;
  transform: translateX(-50%);
  border-radius: 2px;
}

.hour { width: 4px; height: 30px; background: var(--gold-primary); }
.minute { width: 3px; height: 42px; background: var(--gold-bright); }
.second { width: 1.5px; height: 48px; background: var(--congo-red); }

.digital {
  margin-top: 10px;
  color: var(--gold-bright);
  font-weight: 300;
  letter-spacing: 0.3em;
  font-size: 1.2rem;
}

/* Countdown in Premium Gold */
.countdown {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 2.5rem 0;
}

.time-box {
  display: flex;
  flex-direction: column;
}

.time-box span {
  font-size: 2.5rem;
  font-weight: 200;
  color: var(--gold-bright);
  display: block;
  line-height: 1;
}

.time-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  color: var(--gold-primary);
  letter-spacing: 0.2em;
  margin-top: 8px;
}

/* KEYNOTE TEXT SCENES (onveranderd qua animatie) */
.scenes-container {
  height: 60px;
  margin-top: 2rem;
}

.scene {
  position: absolute;
  left: 0; right: 0;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeScene 12s infinite;
  font-size: 1.1rem;
  font-weight: 300;
  letter-spacing: 0.05em;
  color: #fff;
}

.scene:nth-child(1) { animation-delay: 0s; }
.scene:nth-child(2) { animation-delay: 4s; }
.scene:nth-child(3) { animation-delay: 8s; }

@keyframes fadeScene {
  0% { opacity: 0; transform: translateY(10px); }
  5% { opacity: 1; transform: translateY(0); }
  28% { opacity: 1; }
  33% { opacity: 0; transform: translateY(-10px); }
  100% { opacity: 0; }
}

.lingala {
  margin-top: 3rem;
  color: var(--gold-primary);
  letter-spacing: 0.6em;
  font-weight: bold;
  font-size: 0.8rem;
  border-top: 1px solid rgba(196, 154, 60, 0.2);
  display: inline-block;
  padding-top: 1rem;
}
</style>
</head>

<body>

<div class="vignette"></div>

<div class="box">

  <div class="logo">KINOI.S</div>
  <div class="slogan">Connecting the Diaspora</div>

  <div class="flag"></div>

  <div class="timezone" id="tz"></div>

  <div class="clock">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
  </div>

  <div class="digital" id="digitalClock"></div>

  <div class="countdown">
    <div class="time-box"><span id="days"></span><div class="time-label">Jours</div></div>
    <div class="time-box"><span id="hours"></span><div class="time-label">Heures</div></div>
    <div class="time-box"><span id="minutes"></span><div class="time-label">Minutes</div></div>
    <div class="time-box"><span id="seconds"></span><div class="time-label">Secondes</div></div>
  </div>

  <div class="scenes-container">
    <div class="scene">L’infrastructure digitale de la diaspora congolaise.</div>
    <div class="scene">Where talent, trust, and opportunity converge.</div>
    <div class="scene">A living network built for collaboration.</div>
  </div>

  <div class="lingala">BISO NA BISO</div>

</div>

<script>
const launchDate = new Date("2026-05-09T00:00:00Z").getTime();

document.getElementById("tz").innerText = Intl.DateTimeFormat().resolvedOptions().timeZone;

function update(){
  const now = new Date();
  const diff = launchDate - now.getTime();

  if(diff > 0) {
    document.getElementById("days").innerText = Math.floor(diff/(1000*60*60*24));
    document.getElementById("hours").innerText = Math.floor(diff/(1000*60*60)%24);
    document.getElementById("minutes").innerText = Math.floor(diff/(1000*60)%60);
    document.getElementById("seconds").innerText = Math.floor(diff/1000%60);
  }

  const sec = now.getSeconds()*6;
  const min = now.getMinutes()*6;
  const hour = (now.getHours()%12)*30 + now.getMinutes()/2;

  document.getElementById("second").style.transform = `translateX(-50%) rotate(${sec}deg)`;
  document.getElementById("minute").style.transform = `translateX(-50%) rotate(${min}deg)`;
  document.getElementById("hour").style.transform = `translateX(-50%) rotate(${hour}deg)`;

  document.getElementById("digitalClock").innerText = now.toLocaleTimeString();
}

setInterval(update,1000);
update();
</script>

</body>
</html>
