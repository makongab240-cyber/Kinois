<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
body{
  background:#05070B;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
  font-family:sans-serif;
  overflow:hidden;
  position:relative;
  color:#EDE8DC;
}

/* Background glow */
body::before{
  content:"";
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(circle, rgba(196,154,60,0.15), transparent 70%);
  animation:pulse 6s infinite ease-in-out;
}

@keyframes pulse{
  0%,100%{transform:scale(1);opacity:0.4;}
  50%{transform:scale(1.3);opacity:0.7;}
}

/* vignette */
.vignette{
  position:absolute;
  width:100%;
  height:100%;
  background:radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.85));
  z-index:1;
}

/* particles */
.particles span{
  position:absolute;
  width:2px;
  height:2px;
  background:#FFD700;
  border-radius:50%;
  opacity:0.5;
  animation:float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* container */
.box{
  text-align:center;
  z-index:2;
  opacity:0;
  transform:translateY(20px);
  animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
  to{opacity:1; transform:translateY(0);}
}

/* logo */
.logo{
  font-size:3.5rem;
  letter-spacing:0.7em;
  margin-bottom:2rem;
  background:linear-gradient(120deg,#C49A3C,#FFD700,#FFF2B0,#C49A3C);
  background-size:300% auto;
  color:transparent;
  -webkit-background-clip:text;
  background-clip:text;
  animation:shimmer 5s linear infinite;
}

@keyframes shimmer{
  0%{background-position:200% center;}
  100%{background-position:-200% center;}
}

/* flag beam */
.flag{
  width:340px;
  height:6px;
  margin:0 auto 2rem auto;
  transform:skewX(-25deg);
  background:linear-gradient(
    90deg,
    #00A3E0 0%,
    #00A3E0 35%,
    #FFD100 48%,
    #CE1126 52%,
    #FFD100 55%,
    #00A3E0 70%,
    #00A3E0 100%
  );
  background-size:250% 100%;
  animation:move 5s linear infinite;
  box-shadow:0 0 15px rgba(255,209,0,0.5);
}

@keyframes move{
  0%{background-position:0;}
  100%{background-position:250%;}
}

/* countdown */
.countdown{
  display:flex;
  justify-content:center;
  gap:25px;
  margin:2rem 0;
}

.time-box span{
  display:block;
  font-size:2rem;
  color:#FFD700;
}

/* clock */
.clock{
  width:120px;
  height:120px;
  border:2px solid rgba(255,215,0,0.4);
  border-radius:50%;
  margin:1rem auto;
  position:relative;
}

.hand{
  position:absolute;
  bottom:50%;
  left:50%;
  transform-origin:bottom;
  transform:translateX(-50%);
}

.hour{width:4px;height:30px;background:#C49A3C;}
.minute{width:3px;height:40px;background:#FFD700;}
.second{width:2px;height:45px;background:#CE1126;}

.digital{
  margin-top:10px;
  color:#FFD700;
  letter-spacing:0.2em;
}

p{
  margin-top:1.5rem;
  font-size:1rem;
  letter-spacing:0.3em;
  color:rgba(237,232,220,0.7);
}
</style>
</head>

<body>

<!-- particles -->
<div class="particles">
  <span style="left:10%;animation-delay:0s"></span>
  <span style="left:20%;animation-delay:2s"></span>
  <span style="left:30%;animation-delay:4s"></span>
  <span style="left:40%;animation-delay:1s"></span>
  <span style="left:50%;animation-delay:3s"></span>
  <span style="left:60%;animation-delay:5s"></span>
  <span style="left:70%;animation-delay:2s"></span>
  <span style="left:80%;animation-delay:4s"></span>
  <span style="left:90%;animation-delay:1s"></span>
</div>

<div class="vignette"></div>

<div class="box">

  <div class="logo">KINOI.S</div>
  <div class="flag"></div>

  <!-- CLOCK -->
  <div class="clock">
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
  </div>

  <div class="digital" id="digitalClock"></div>

  <!-- COUNTDOWN -->
  <div class="countdown">
    <div class="time-box"><span id="days"></span>Jours</div>
    <div class="time-box"><span id="hours"></span>Heures</div>
    <div class="time-box"><span id="minutes"></span>Minutes</div>
    <div class="time-box"><span id="seconds"></span>Secondes</div>
  </div>

  <p>LANCEMENT BIENTÔT — LE PREMIER HUB DIGITAL DE LA DIASPORA CONGOLAISE</p>

</div>

<script>
// 🌍 Launch time (UTC - stable worldwide)
const launchDate = new Date("2026-05-09T00:00:00Z").getTime();

// 🌐 detect timezone (future use)
const userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
console.log("User timezone:", userTimeZone);

function update(){

  const now = new Date();
  const diff = launchDate - now.getTime();

  // countdown
  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff/(1000*60*60))%24);
  const m = Math.floor((diff/(1000*60))%60);
  const s = Math.floor((diff/1000)%60);

  document.getElementById("days").innerText = d;
  document.getElementById("hours").innerText = h;
  document.getElementById("minutes").innerText = m;
  document.getElementById("seconds").innerText = s;

  // analog clock
  const sec = now.getSeconds()*6;
  const min = now.getMinutes()*6;
  const hour = (now.getHours()%12)*30 + now.getMinutes()/2;

  document.getElementById("second").style.transform =
    `translateX(-50%) rotate(${sec}deg)`;

  document.getElementById("minute").style.transform =
    `translateX(-50%) rotate(${min}deg)`;

  document.getElementById("hour").style.transform =
    `translateX(-50%) rotate(${hour}deg)`;

  // digital clock
  document.getElementById("digitalClock").innerText =
    now.toLocaleTimeString();

}

setInterval(update,1000);
update();
</script>

</body>
</html>
